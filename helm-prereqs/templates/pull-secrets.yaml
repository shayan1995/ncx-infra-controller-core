{{- if .Values.imagePullSecrets.ngcNicoPull }}
---
apiVersion: v1
kind: Secret
metadata:
  name: nvcr-nico-dev
  namespace: {{ .Values.namespace }}
type: kubernetes.io/dockerconfigjson
data:
  .dockerconfigjson: {{ printf `{"auths":{"nvcr.io":{"username":"$oauthtoken","password":"%s"}}}` .Values.imagePullSecrets.ngcNicoPull | b64enc }}
{{- end }}
{{- if .Values.imagePullSecrets.ngcNvidianKey }}
---
apiVersion: v1
kind: Secret
metadata:
  name: nvcr-nvidian-nvnico
  namespace: {{ .Values.namespace }}
type: kubernetes.io/dockerconfigjson
data:
  .dockerconfigjson: {{ printf `{"auths":{"nvcr.io":{"username":"$oauthtoken","password":"%s"}}}` .Values.imagePullSecrets.ngcNvidianKey | b64enc }}
{{- end }}
