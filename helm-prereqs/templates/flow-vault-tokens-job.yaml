{{- if and .Values.flow.enabled .Values.vault.configJob.enabled }}
## =============================================================================
## Flow Vault Tokens — psm-vault-token, nsm-vault-token
## =============================================================================
## PSM and NSM containers in the flow pod authenticate to Vault with a
## periodic token (VAULT_TOKEN env var).  NICod provisions these out-of-band;
## here we mint them with a scoped policy as a post-install Helm hook so
## `./setup.sh` brings flow up end-to-end with no manual secret juggling.
##
## Runs after the main vault-pki-config job (hook-weight: 20 > 10).
## Mints a periodic Vault token per service (period=24h; the token never
## expires as long as it's renewed within that window) with read/write on
## its own KV subtree, then writes the token into a Secret in the flow
## namespace.
## =============================================================================
---
apiVersion: v1
kind: ServiceAccount
metadata:
  name: flow-vault-tokens-sa
  namespace: {{ .Values.namespace }}
  annotations:
    helm.sh/hook: post-install,post-upgrade
    helm.sh/hook-weight: "15"
    helm.sh/hook-delete-policy: before-hook-creation
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRole
metadata:
  name: flow-vault-tokens-writer
  annotations:
    helm.sh/hook: post-install,post-upgrade
    helm.sh/hook-weight: "15"
    helm.sh/hook-delete-policy: before-hook-creation
rules:
  - apiGroups: [""]
    resources: ["namespaces"]
    verbs: ["get", "create", "patch"]
  - apiGroups: [""]
    resources: ["secrets"]
    verbs: ["get", "create", "update", "patch"]
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRoleBinding
metadata:
  name: flow-vault-tokens-writer
  annotations:
    helm.sh/hook: post-install,post-upgrade
    helm.sh/hook-weight: "15"
    helm.sh/hook-delete-policy: before-hook-creation
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: ClusterRole
  name: flow-vault-tokens-writer
subjects:
  - kind: ServiceAccount
    name: flow-vault-tokens-sa
    namespace: {{ .Values.namespace }}
---
apiVersion: batch/v1
kind: Job
metadata:
  name: flow-vault-tokens
  namespace: {{ .Values.namespace }}
  annotations:
    helm.sh/hook: post-install,post-upgrade
    helm.sh/hook-weight: "20"
    helm.sh/hook-delete-policy: before-hook-creation
spec:
  backoffLimit: 2
  activeDeadlineSeconds: 600
  template:
    spec:
      serviceAccountName: flow-vault-tokens-sa
      restartPolicy: Never
      initContainers:
        - name: wait-vault
          image: {{ .Values.vault.configJob.vaultImage | quote }}
          env:
            - name: VAULT_ADDR
              value: {{ .Values.vault.address | quote }}
            - name: VAULT_SKIP_VERIFY
              value: "true"
          command:
            - sh
            - -c
            - |
              echo "Waiting for Vault PKI config job to finish (policies + auth methods need to exist)..."
              until vault status -tls-skip-verify -format=json 2>/dev/null \
                | grep -q '"sealed":[[:space:]]*false'; do
                echo "  Vault not ready, retrying in 5s..."
                sleep 5
              done
              echo "Vault ready"
      volumes:
        - name: tokens
          emptyDir: {}
      containers:
        ## ---------------------------------------------------------------
        ## Mint per-service Vault tokens, write them to /tokens.
        ## ---------------------------------------------------------------
        - name: mint
          image: {{ .Values.vault.configJob.vaultImage | quote }}
          env:
            - name: VAULT_ADDR
              value: {{ .Values.vault.address | quote }}
            - name: VAULT_SKIP_VERIFY
              value: "true"
            - name: VAULT_TOKEN
              valueFrom:
                secretKeyRef:
                  name: nico-vault-token
                  key: token
          volumeMounts:
            - name: tokens
              mountPath: /tokens
          command:
            - /bin/sh
            - -c
            - |
              set -e

              # PSM policy: read/write on its own KV subtree + PKI sign for SPIFFE.
              echo "Writing psm-vault-policy..."
              vault policy write psm-vault-policy - <<'POLICY'
              path "{{ .Values.vault.kvMount }}/data/psm/*" {
                capabilities = ["create", "read", "update", "delete", "list"]
              }
              path "{{ .Values.vault.kvMount }}/metadata/psm/*" {
                capabilities = ["read", "list", "delete"]
              }
              path "{{ .Values.vault.pkiMount }}/sign/{{ .Values.vault.pkiRole }}" {
                capabilities = ["create", "update"]
              }
              POLICY

              echo "Writing nsm-vault-policy..."
              vault policy write nsm-vault-policy - <<'POLICY'
              path "{{ .Values.vault.kvMount }}/data/nsm/*" {
                capabilities = ["create", "read", "update", "delete", "list"]
              }
              path "{{ .Values.vault.kvMount }}/metadata/nsm/*" {
                capabilities = ["read", "list", "delete"]
              }
              path "{{ .Values.vault.pkiMount }}/sign/{{ .Values.vault.pkiRole }}" {
                capabilities = ["create", "update"]
              }
              POLICY

              # Mint periodic tokens (renewable every 24h, never expire while renewed).
              echo "Minting psm token..."
              vault token create \
                -policy=psm-vault-policy \
                -period=24h \
                -display-name=psm-vault-token \
                -field=token > /tokens/psm-token

              echo "Minting nsm token..."
              vault token create \
                -policy=nsm-vault-policy \
                -period=24h \
                -display-name=nsm-vault-token \
                -field=token > /tokens/nsm-token

              touch /tokens/done
              echo "Tokens minted"
        ## ---------------------------------------------------------------
        ## Write tokens into k8s Secrets in the flow namespace.
        ## ---------------------------------------------------------------
        - name: write-secrets
          image: {{ .Values.vault.configJob.kubectlImage | quote }}
          volumeMounts:
            - name: tokens
              mountPath: /tokens
          command:
            - /bin/sh
            - -c
            - |
              set -e
              echo "Waiting for mint container..."
              until [ -f /tokens/done ]; do sleep 2; done

              # Ensure flow namespace exists and is labeled for ESO sync.
              kubectl create namespace {{ .Values.flow.namespace }} --dry-run=client -o yaml \
                | kubectl apply -f -
              kubectl label namespace {{ .Values.flow.namespace }} \
                nico.nvidia.com/managed=true --overwrite

              PSM_TOKEN=$(cat /tokens/psm-token)
              NSM_TOKEN=$(cat /tokens/nsm-token)

              for pair in "psm-vault-token:$PSM_TOKEN" "nsm-vault-token:$NSM_TOKEN"; do
                name=${pair%%:*}
                value=${pair#*:}
                kubectl create secret generic "$name" \
                  -n {{ .Values.flow.namespace }} \
                  --from-literal=token="$value" \
                  --dry-run=client -o yaml | kubectl apply -f -
              done
              echo "psm-vault-token and nsm-vault-token written to {{ .Values.flow.namespace }} namespace"
{{- end }}
