# Example configuration for nico-dsx-exchange-consumer service

# ==============================================================================
# MQTT Configuration - DSX Exchange Event Bus
# ==============================================================================

[mqtt]
endpoint = "mqtt.nico"
port = 1884
client_id = "nico-dsx-exchange-consumer"
topic_prefix = "BMS/v1"
# Maximum number of messages to buffer before dropping (default: 1024)
queue_capacity = 1024
# How long the MQTT event loop is allowed to go without a successful
# SubAck/Publish/PingResp before mqttea tears down its rumqttc client
# and stands up a fresh one with tracked subscriptions replayed
# (default: 30s). Backstop for the rare case where rumqttc never
# reaches CONNACK on its own -- the common case (broker briefly down
# then back up) is handled by mqttea's CONNACK-resubscribe path
# without this firing.
reconnect_rebuild_threshold = "30s"

# ==============================================================================
# Cache Configuration - TTL settings (uses moka for automatic eviction)
# ==============================================================================

[cache]
# Time-to-live for metadata cache entries (default: 1 hour)
metadata_ttl = "1h"
# Time-to-live for value state cache entries used for deduplication (default: 1 hour)
value_state_ttl = "1h"

# ==============================================================================
# NICo API Configuration - for submitting rack health reports
# ==============================================================================

[nico_api]
root_ca = "/var/run/secrets/spiffe.io/ca.crt"
client_cert = "/var/run/secrets/spiffe.io/tls.crt"
client_key = "/var/run/secrets/spiffe.io/tls.key"
api_url = "https://nico-api.nico-system.svc.cluster.local:1079"

# ==============================================================================
# Metrics
# ==============================================================================

[metrics]
endpoint = "0.0.0.0:9009"
