# Example configuration for nico-dns (TOML).
#
# Every setting is shown commented out with its built-in default; uncomment a
# line to override that default. Key names must match the fields on `Config` in
# src/config.rs; an unrecognized key is silently ignored.

# Address (host:port) the DNS server listens on for UDP and TCP.
# listen_address = "[::]:53"

# URI of the nico-api server queried for DNS records.
# api_uri = "https://nico-api.nico-system.svc.cluster.local:1079"

# Path to the root CA certificate used to verify the nico-api server.
# root_ca_path = "/var/run/secrets/spiffe.io/ca.crt"

# Path to the client certificate presented to nico-api for mTLS.
# client_cert_path = "/var/run/secrets/spiffe.io/tls.crt"

# Path to the client private key presented to nico-api for mTLS.
# client_key_path = "/var/run/secrets/spiffe.io/tls.key"

# OTLP gRPC endpoint that traces are exported to.
# otlp_endpoint = "http://opentelemetry-collector.otel.svc.cluster.local:4317"

# How long to cache NXDomain and Refused responses, in seconds.
# negative_cache_ttl_secs = 120

# Maximum number of entries the negative cache may hold. Once reached, new
# negative responses are not cached, bounding memory under a flood of distinct
# non-existent names.
# negative_cache_entries_max_count = 200000

# Address (host:port) the Prometheus metrics server listens on.
# metrics_listen_address = "[::]:8053"