[env]
CARGO_MAKE_EXTEND_WORKSPACE_MAKEFILE = true
REPO_ROOT = { script = [
  "dirname $(cargo locate-project --message-format plain --workspace)",
] }
PKG_VERSION = { script = [
  "V=$(git describe --tags --first-parent --always --long | sed 's/^v//'); case $V in [0-9]*) echo $V;; *) echo 0.0.0-$V;; esac",
] }

[tasks.package-component-local]
run_task = "package-component"
dependencies = [
  { name = "build-component-local", path = "./Makefile-build.toml" },
]

[tasks.package-component-in-container]
run_task = "package-component"
dependencies = [
  { name = "build-component-in-container", path = "./Makefile-build.toml" },
]

[tasks.package-component]
category = "Build"
description = "Build the .deb package"
workspace = false
script = '''
    if [ "${NICO_ARCH}" = "x86_64" ]
    then
        DEB_ARCH="amd64"
    else
        DEB_ARCH="arm64"
    fi

    PACKAGE_BIN=$(cargo metadata --no-deps --format-version 1 | jq -r '.packages[] | select(any(.; .name == "'${NICO_CRATE}'")) | .targets[] | select(any(.kind[]; . == "bin")) | .name')
    if [ -z "$PACKAGE_BIN" ]
    then
      echo "Could not determine binary for package ${NICO_PACKAGE}"
      exit 1
    fi
    MISC_DIR=${NICO_CRATE_DIR}/misc
    DEB_CONFIG_DIR=${MISC_DIR}/DEBIAN
    : "${INSTALL_DIR:=/opt/nico}"
    if [ ! -d ${DEB_CONFIG_DIR} ]
    then
      echo "Cannot package ${NICO_PACKAGE}.  No package configuration"
      exit 1
    fi

    echo "creating package for ${NICO_ARCH} ${NICO_PACKAGE} (${PACKAGE_BIN}) (${PKG_VERSION}) with install path ${INSTALL_DIR}"
    WORKING_DIR="${REPO_ROOT}/target/${NICO_ARCH}-unknown-linux-gnu/${PACKAGE_BIN}_${PKG_VERSION}_${DEB_ARCH}"
    mkdir -p "${WORKING_DIR}/lib/systemd/system"
    mkdir -p "${WORKING_DIR}${INSTALL_DIR}"
    cp "${REPO_ROOT}/target/${NICO_ARCH}-unknown-linux-gnu/${NICO_PROFILE}/${PACKAGE_BIN}" "${WORKING_DIR}${INSTALL_DIR}"
    cp ${MISC_DIR}/*.service "${WORKING_DIR}/lib/systemd/system/"
    cp -r ${DEB_CONFIG_DIR} "${WORKING_DIR}/"
    echo 'Package: '${NICO_PACKAGE}'
Version: '${PKG_VERSION}'
Section: base
Priority: optional
Architecture: '${DEB_ARCH}'
Maintainer: NICo team <swngc-nico-dev@nvidia.com>
Description: NICo scout for performaing hardware discovery
' > ${WORKING_DIR}/DEBIAN/control
    mkdir -p ${REPO_ROOT}/target/debs/
    dpkg-deb --build --root-owner-group ${WORKING_DIR} ${REPO_ROOT}/target/debs/${PACKAGE_BIN}_${PKG_VERSION}_${DEB_ARCH}.deb
'''
