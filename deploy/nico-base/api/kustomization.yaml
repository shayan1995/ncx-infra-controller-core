apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization

labels:
  - pairs:
      app.kubernetes.io/name: nico-api
      app.kubernetes.io/component: api
    includeSelectors: true
    includeTemplates: true

resources:
  - api-service.yaml
  - certificate.yaml
  - deployment.yaml
  - metrics-service.yaml
  - profiler-service.yaml
  - role.yaml
  - rolebinding.yaml
  - service-account.yaml
  - migration.yaml

configMapGenerator:
  - name: nico-api-config-files
    files:
      - config-files/nico-api-config.toml
      - config-files/casbin-policy.csv
  - name: nico-api-site-config-files
    # Site specific list of files is added in `envs`
    files: []

generatorOptions:
  disableNameSuffixHash: true

