### DPF contract ###
serviceDaemonSet:
  nodeSelector:
  labels: {}
  annotations: {}
  updateStrategy: {}
  resources: {}
exposedPorts:
  labels: {}
  ports: {}

### Cert directory + root CA filename overrides.
certsDir: /opt/nico
rootCaFile: nico_root.pem

### Service specific values ###
# Prometheus /metrics listen port (must match nico-otelcol scrape target).
metricsPort: 8888
image:
  repository: ""
  pullPolicy: IfNotPresent
  tag: ""
imagePullSecrets: []
podSecurityContext: {}
securityContext:
  runAsUser: 0                                                                        
  runAsGroup: 0
  capabilities:
    add:
      - NET_ADMIN
      - NET_RAW
      - NET_BIND_SERVICE
tolerations: []
