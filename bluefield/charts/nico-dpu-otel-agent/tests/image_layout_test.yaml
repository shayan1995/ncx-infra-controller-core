suite: cert directory overrides
templates:
  - daemonset.yaml
  - configmap.yaml
tests:
  - it: should mount certs at /opt/nico by default
    template: daemonset.yaml
    set:
      image:
        repository: test
        tag: test
    asserts:
      - contains:
          path: spec.template.spec.containers[0].volumeMounts
          content:
            name: nico-certs
            mountPath: /opt/nico
            readOnly: true

  - it: should hostPath-mount /opt/nico by default
    template: daemonset.yaml
    set:
      image:
        repository: test
        tag: test
    asserts:
      - contains:
          path: spec.template.spec.volumes
          content:
            name: nico-certs
            hostPath:
              path: /opt/nico
              type: DirectoryOrCreate

  - it: configmap should embed /opt/nico/nico_root.pem in root-ca by default
    template: configmap.yaml
    set:
      image:
        repository: test
        tag: test
    asserts:
      - matchRegex:
          path: data["config.toml"]
          pattern: 'root-ca\s*=\s*"/opt/nico/nico_root\.pem"'

  - it: should fall back to /opt/nico when certsDir is cleared
    template: daemonset.yaml
    set:
      image:
        repository: test
        tag: test
      certsDir: null
    asserts:
      - contains:
          path: spec.template.spec.containers[0].volumeMounts
          content:
            name: nico-certs
            mountPath: /opt/nico
            readOnly: true
      - contains:
          path: spec.template.spec.volumes
          content:
            name: nico-certs
            hostPath:
              path: /opt/nico
              type: DirectoryOrCreate

  - it: configmap should embed /opt/nico/nico_root.pem when overrides cleared
    template: configmap.yaml
    set:
      image:
        repository: test
        tag: test
      certsDir: null
      rootCaFile: null
    asserts:
      - matchRegex:
          path: data["config.toml"]
          pattern: 'root-ca\s*=\s*"/opt/nico/nico_root\.pem"'
