suite: cert directory overrides
templates:
  - daemonset.yaml
tests:
  - it: should mount certs at /opt/nico in init container by default
    set:
      image:
        repository: test
        tag: test
    asserts:
      - contains:
          path: spec.template.spec.initContainers[0].volumeMounts
          content:
            name: nico-certs
            mountPath: /opt/nico

  - it: should mount certs at /opt/nico in main container by default
    set:
      image:
        repository: test
        tag: test
    asserts:
      - contains:
          path: spec.template.spec.containers[0].volumeMounts
          content:
            name: nico-certs
            mountPath: /opt/nico

  - it: should hostPath-mount /opt/nico by default
    set:
      image:
        repository: test
        tag: test
    asserts:
      - contains:
          path: spec.template.spec.volumes
          content:
            name: nico-certs
            hostPath:
              path: /opt/nico
              type: DirectoryOrCreate

  - it: should fall back to /opt/nico when certsDir is cleared
    set:
      image:
        repository: test
        tag: test
      certsDir: null
    asserts:
      - contains:
          path: spec.template.spec.initContainers[0].volumeMounts
          content:
            name: nico-certs
            mountPath: /opt/nico
      - contains:
          path: spec.template.spec.containers[0].volumeMounts
          content:
            name: nico-certs
            mountPath: /opt/nico
      - contains:
          path: spec.template.spec.volumes
          content:
            name: nico-certs
            hostPath:
              path: /opt/nico
              type: DirectoryOrCreate

  - it: should accept a custom certsDir value
    set:
      image:
        repository: test
        tag: test
      certsDir: /custom/cert/dir
    asserts:
      - contains:
          path: spec.template.spec.initContainers[0].volumeMounts
          content:
            name: nico-certs
            mountPath: /custom/cert/dir
      - contains:
          path: spec.template.spec.volumes
          content:
            name: nico-certs
            hostPath:
              path: /custom/cert/dir
              type: DirectoryOrCreate
