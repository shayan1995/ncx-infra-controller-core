    mkdir -p "nico-dpu_${vers}_arm64/var/lib/hbn/var/support/nico-dhcp/bin"
    mkdir -p "nico-dpu_${vers}_arm64/var/lib/hbn/var/support/nico-dhcp/conf"
    mkdir -p "nico-dpu_${vers}_arm64/var/lib/hbn/var/support/nico-dhcp/logs"
    mkdir -p "nico-dpu_${vers}_arm64/etc/otelcol-contrib/certs/private" && chmod 600 "nico-dpu_${vers}_arm64/etc/otelcol-contrib/certs/private"
    mkdir -p "nico-dpu_${vers}_arm64/etc/nico-dpu-otel-agent"
    mkdir -p "nico-dpu_${vers}_arm64/var/lib/otelcol-contrib/cursors"
    cp ${REPO_ROOT}/target/release/nico-dpu-agent "nico-dpu_${vers}_arm64/usr/bin/"
    cp ${REPO_ROOT}/target/release/nico-dhcp-server "nico-dpu_${vers}_arm64/var/lib/hbn/var/support/nico-dhcp/bin/"
    cp ${REPO_ROOT}/target/release/nico-dpu-otel-agent "nico-dpu_${vers}_arm64/usr/bin/"
    cp otel/otel-agent "nico-dpu_${vers}_arm64/usr/local/bin/" && chmod u+x "nico-dpu_${vers}_arm64/usr/local/bin/otel-agent"
    cp otel/scripts/otel_copy_certs.sh "nico-dpu_${vers}_arm64/usr/local/sbin/" && chmod u+x "nico-dpu_${vers}_arm64/usr/local/sbin/otel_copy_certs.sh"
    cp misc/nico-dpu-agent.service "nico-dpu_${vers}_arm64/lib/systemd/system/"
    cp misc/nico-dpu-otel-agent.service "nico-dpu_${vers}_arm64/lib/systemd/system/"
    cp misc/clean_core_files.sh "nico-dpu_${vers}_arm64/usr/bin/" && chmod u+x "nico-dpu_${vers}_arm64/usr/bin/clean_core_files.sh"
    cp misc/local_bmc_dev "nico-dpu_${vers}_arm64/usr/bin/"
    cp misc/local_bmc_dev.service "nico-dpu_${vers}_arm64/lib/systemd/system/"
    cp misc/node-exporter.service "nico-dpu_${vers}_arm64/lib/systemd/system/"
    cp misc/transceiver-exporter.service "nico-dpu_${vers}_arm64/lib/systemd/system/"
    cp misc/otelcol-contrib.service "nico-dpu_${vers}_arm64/lib/systemd/system/"
    cp otel/otelcol-wrapper "nico-dpu_${vers}_arm64/etc/otelcol-contrib/" && chmod u+x "nico-dpu_${vers}_arm64/etc/otelcol-contrib/otelcol-wrapper"
    cp otel/otelcol-wrapper-imports "nico-dpu_${vers}_arm64/etc/otelcol-contrib/" && chmod u+x "nico-dpu_${vers}_arm64/etc/otelcol-contrib/otelcol-wrapper-imports"
    cp otel/otelcol-wrapper-validate "nico-dpu_${vers}_arm64/etc/otelcol-contrib/" && chmod u+x "nico-dpu_${vers}_arm64/etc/otelcol-contrib/otelcol-wrapper-validate"
    cp -r otel/config-fragments "nico-dpu_${vers}_arm64/etc/otelcol-contrib/"
    cp otel/otel_config.yaml "nico-dpu_${vers}_arm64/etc/otelcol-contrib/config.yaml"
    cp otel/otel-agent-config.toml "nico-dpu_${vers}_arm64/etc/nico-dpu-otel-agent/config.toml"
    cp -r misc/DEBIAN "nico-dpu_${vers}_arm64/"
	sed -i "s/SED__DPU_AGENT_PKG_VERSION/${vers}/" nico-dpu_${vers}_arm64/DEBIAN/control
'''
dependencies = [
  "build-dpu-agent-and-dhcp-server-ci",
  "include-otelcol",
  "include-node-exporter",
  "include-transceiver-exporter",
  "build-dpu-otel-agent-ci",
]

[tasks.build-nico-dpu-deb-local]
category = "Build"
description = "Build the nico-dpu.deb package locally"
workspace = false
script = '''
    mkdir -p ${REPO_ROOT}/target/debs/
    dpkg-deb --build nico-dpu_${DPU_AGENT_PKG_VERSION}_arm64 ${REPO_ROOT}/target/debs/
'''
dependencies = ["setup-dpu-agent-deb-local"]

[tasks.build-otel-dpu-deb-local]
category = "Build"
description = "Build the otel-dpu.deb package locally for otel without dpu agent"
workspace = false
script = '''
    export vers=${DPU_AGENT_PKG_VERSION}
    mkdir -p "otel-dpu_${vers}_arm64/lib/systemd/system"
    mkdir -p "otel-dpu_${vers}_arm64/usr/bin"
    mkdir -p "otel-dpu_${vers}_arm64/usr/local/sbin"
    mkdir -p "otel-dpu_${vers}_arm64/etc/otelcol-contrib/certs/private" && chmod 600 "otel-dpu_${vers}_arm64/etc/otelcol-contrib/certs/private"
    mkdir -p "otel-dpu_${vers}_arm64/usr/share/otelcol-contrib/docker/otel-agent"
    cp misc/otelcol-contrib.service "otel-dpu_${vers}_arm64/lib/systemd/system/"
    cp otel/site-controller/otelcol-wrapper "otel-dpu_${vers}_arm64/etc/otelcol-contrib/" && chmod u+x "otel-dpu_${vers}_arm64/etc/otelcol-contrib/otelcol-wrapper"
    cp otel/site-controller/otel_config.yaml "otel-dpu_${vers}_arm64/etc/otelcol-contrib/config.yaml"
    cp otel/site-controller/otel-agent/Dockerfile "otel-dpu_${vers}_arm64/usr/share/otelcol-contrib/docker/otel-agent/"
    cp otel/site-controller/otel-agent/otel-agent.sh "otel-dpu_${vers}_arm64/usr/share/otelcol-contrib/docker/otel-agent/" && chmod u+x "otel-dpu_${vers}_arm64/usr/share/otelcol-contrib/docker/otel-agent/otel-agent.sh"
    cp otel/site-controller/otel-agent/otel-agent.yaml.template "otel-dpu_${vers}_arm64/usr/share/otelcol-contrib/docker/otel-agent/"
    cp otel/site-controller/scripts/map_endpoints.sh "otel-dpu_${vers}_arm64/usr/local/sbin/" && chmod u+x "otel-dpu_${vers}_arm64/usr/local/sbin/map_endpoints.sh"
    cp otel/site-controller/scripts/localhost_alias.sh "otel-dpu_${vers}_arm64/usr/local/sbin/" && chmod u+x "otel-dpu_${vers}_arm64/usr/local/sbin/localhost_alias.sh"
    cp otel/site-controller/scripts/otel_post_install.sh "otel-dpu_${vers}_arm64/usr/local/sbin/" && chmod u+x "otel-dpu_${vers}_arm64/usr/local/sbin/otel_post_install.sh"
    cp misc/site-controller/otel-agent.service "otel-dpu_${vers}_arm64/lib/systemd/system/"
    cp ${REPO_ROOT}/target/aarch64-unknown-linux-gnu/release/nico-dpu-otel-agent "otel-dpu_${vers}_arm64/usr/bin/otel-agent"
    cp otel/otel-agent-config.toml "otel-dpu_${vers}_arm64/etc/otelcol-contrib/otel-agent.toml"
    cp "nico-dpu_${vers}_arm64/usr/bin/otelcol-contrib" "otel-dpu_${vers}_arm64/usr/bin/"
    cp -r misc/site-controller/DEBIAN "otel-dpu_${vers}_arm64/"
    sed -i "s/SED__DPU_AGENT_PKG_VERSION/${vers}/" otel-dpu_${vers}_arm64/DEBIAN/control

    dpkg-deb --build otel-dpu_${DPU_AGENT_PKG_VERSION}_arm64 ${REPO_ROOT}/target/debs/
'''
dependencies = ["build-nico-dpu-deb-local"]

