[env]
# e.g. 2024.05.24-rc1-0-0-g786e94757
DPU_AGENT_PKG_VERSION = { script = [
  "echo $(git describe --tags --first-parent --always --long | cut -c 2-)",
] }

[tasks.cleanup-local-pkg-files]
category = "Build"
workspace = false
description = "clean up locally built nico-dpu-agent files"
script = '''
  echo Removing locally built nico-dpu-agent files ...
  rm -rf nico-dpu_*
  rm -rf otel-dpu_*
  echo Cleanup completed.
'''

[tasks.cleanup-custom-otelcol-build]
category = "Build"
workspace = false
description = "cleaup custom OpenTelemetry collector build"
script = '''
  echo Cleaning up custom OpenTelemetry collector build ...
  rm -f ${REPO_ROOT}/bluefield/otel/ocb
  rm -f ${REPO_ROOT}/bluefield/otel/ocb_config.yaml
  rm -rf ${REPO_ROOT}/bluefield/otel/ocb-build
  echo Cleanup completed.
'''
dependencies = ["cleanup-go"]

[tasks.cleanup-node-exporter]
category = "Build"
workspace = false
description = "cleanup Prometheus node exporter"
script = '''
  echo Cleaning up Prometheus node exporter ...
  rm -rf ${REPO_ROOT}/bluefield/node_exporter/node_exporter-*
  echo Cleanup completed.
'''

[tasks.cleanup-transceiver-exporter]
category = "Build"
workspace = false
description = "cleanup transceiver exporter"
script = '''
  echo Cleaning up transceiver exporter ...
  rm -rf ${REPO_ROOT}/bluefield/transceiver_exporter/transceiver-exporter-*
  echo Cleanup completed.
'''

[tasks.clean]
dependencies = [
  "cleanup-local-pkg-files",
  "cleanup-custom-otelcol-build",
  "cleanup-node-exporter",
  "cleanup-transceiver-exporter",
]

[tasks.build-dpu-agent-and-dhcp-server]
category = "Build"
description = "cross compile nico-dpu-agent and dhcp server locally"
workspace = false
script = '''
docker run --rm -v $REPO_ROOT:/nico --user $(id -u):$(id -g) \
    --env CARGO_HOME=/cargo \
    -v $CARGO_HOME:/cargo \
    build-artifacts-container-cross-aarch64:latest \
    "cargo" \
    "build" \
    "--release" \
    "--target=aarch64-unknown-linux-gnu" \
    "--bin" \
    "nico-dpu-agent" \
    "--bin" \
    "nico-dhcp-server"
    docker run --rm -v $REPO_ROOT:/nico --user $(id -u):$(id -g) build-artifacts-container-cross-aarch64:latest "aarch64-linux-gnu-strip" \
    "/nico/target/aarch64-unknown-linux-gnu/release/nico-dpu-agent"
    docker run --rm -v $REPO_ROOT:/nico --user $(id -u):$(id -g) build-artifacts-container-cross-aarch64:latest "aarch64-linux-gnu-strip" \
    "/nico/target/aarch64-unknown-linux-gnu/release/nico-dhcp-server"
'''
dependencies = [
  { name = "build-cross-docker-image", path = "${REPO_ROOT}" },
  { name = "check-cargo-home-set", path = "${REPO_ROOT}" },
]

[tasks.build-dpu-agent-and-dhcp-server-ci]
category = "Build"
workspace = false
description = "Referring to the prebuilt 'build' task doesn't work here, since it always tries to build the full workspace - including targets that are not aarch64 compatible"
command = "cargo"
args = [
  "build",
  "--release",
  "--bin",
  "nico-dpu-agent",
  "--bin",
  "nico-dhcp-server",
]

[tasks.build-fmds]
category = "Build"
description = "cross compile nico-fmds locally"
workspace = false
script = '''
docker run --rm -v $REPO_ROOT:/nico --user $(id -u):$(id -g) \
    --env CARGO_HOME=/cargo \
    -v $CARGO_HOME:/cargo \
    build-artifacts-container-cross-aarch64:latest \
    "cargo" \
    "build" \
    "--release" \
    "--target=aarch64-unknown-linux-gnu" \
    "--bin" \
    "nico-fmds"
    docker run --rm -v $REPO_ROOT:/nico --user $(id -u):$(id -g) build-artifacts-container-cross-aarch64:latest "aarch64-linux-gnu-strip" \
    "/nico/target/aarch64-unknown-linux-gnu/release/nico-fmds"
'''
dependencies = [
  { name = "build-cross-docker-image", path = "${REPO_ROOT}" },
  { name = "check-cargo-home-set", path = "${REPO_ROOT}" },
]

[tasks.build-fmds-ci]
category = "Build"
workspace = false
description = "Build nico-fmds for CI"
command = "cargo"
args = ["build", "--release", "--bin", "nico-fmds"]

[tasks.build-dpu-otel-agent]
category = "Build"
description = "cross compile nico-dpu-otel-agent locally"
workspace = false
script = '''
docker run --rm -v $REPO_ROOT:/nico --user $(id -u):$(id -g) \
    --env CARGO_HOME=/cargo \
    -v $CARGO_HOME:/cargo \
    build-artifacts-container-cross-aarch64:latest \
    "cargo" \
    "build" \
    "--release" \
    "--target=aarch64-unknown-linux-gnu" \
    "--bin" \
    "nico-dpu-otel-agent"
    docker run --rm -v $REPO_ROOT:/nico --user $(id -u):$(id -g) build-artifacts-container-cross-aarch64:latest "aarch64-linux-gnu-strip" \
    "/nico/target/aarch64-unknown-linux-gnu/release/nico-dpu-otel-agent"
'''
dependencies = [
  { name = "build-cross-docker-image", path = "${REPO_ROOT}" },
  { name = "check-cargo-home-set", path = "${REPO_ROOT}" },
]

[tasks.build-dpu-otel-agent-ci]
category = "Build"
workspace = false
description = "Referring to the prebuilt 'build' task doesn't work here, since it always tries to build the full workspace - including targets that are not aarch64 compatible"
command = "cargo"
args = ["build", "--release", "--bin", "nico-dpu-otel-agent"]

[tasks.download-otelcol-builder]
category = "Build"
description = "Download ocb binary (custom otelcol builder)"
workspace = false
script = '''
  cd ${REPO_ROOT}/bluefield/otel
  PLATFORM=$(uname -m | sed 's/x86_64/amd64/' | sed 's/aarch64/arm64/')
  VERSION=$(cat otelcol_version.txt)
  URL=$(sed -e "s/\${PLATFORM}/${PLATFORM}/g" -e "s/\${VERSION}/${VERSION}/g" ocb_url.txt)
  rm -f ocb
  curl --retry 5 --proto '=https' --tlsv1.2 -fL -o ocb -C - $URL
  chmod +x ocb
'''

[tasks.cleanup-go]
category = "Build"
description = "Cleanup go"
workspace = false
script = '''
  GOPATH="${REPO_ROOT}/bluefield/otel/go"
  chmod -R u+w ${GOPATH} 2>/dev/null || true
  rm -rf ${GOPATH}
'''

[tasks.download-go]
category = "Build"
description = "Download go"
workspace = false
condition = { files_not_exist = ["{REPO_ROOT}/bluefield/otel/go"] }
script = '''
  GO_VERSION="1.22.0"
  PLATFORM=$(uname -m | sed 's/x86_64/amd64/' | sed 's/aarch64/arm64/')
  TARFILE=go${GO_VERSION}.linux-${PLATFORM}.tar.gz
  OTEL=${REPO_ROOT}/bluefield/otel
  URL=https://golang.org/dl/${TARFILE}
  wget -q $URL --directory-prefix=${OTEL} --tries=5 --continue --timeout=300
  tar -C ${OTEL} -xzf ${OTEL}/${TARFILE}
  rm ${OTEL}/${TARFILE}
'''

[tasks.check-otelcol-builder]
category = "Build"
description = "Check for ocb binary"
condition = { files_modified = { input = [
  "${REPO_ROOT}/bluefield/otel/ocb_url.txt",
  "${REPO_ROOT}/bluefield/otel/otelcol_version.txt",
], output = [
  "${REPO_ROOT}/bluefield/otel/ocb",
] } }
run_task = "download-otelcol-builder"

[tasks.build-otelcol]
category = "Build"
description = "Build custom OpenTelemetry collector for running on ARM DPU"
workspace = false
script = '''
  OTEL=${REPO_ROOT}/bluefield/otel
  cd ${OTEL}
  VERSION=$(cat otelcol_version.txt)
  FILERESOURCE_VERSION=$(bash ${OTEL}/get_module_version.sh ${OTEL}/fileresourceprocessor)
  TELEMETRYSTATS_VERSION=$(bash ${OTEL}/get_module_version.sh ${OTEL}/telemetrystatsprocessor)
  PUNTSTATS_VERSION=$(bash ${OTEL}/get_module_version.sh ${OTEL}/puntstatsreceiver)
  sed -e "s/\${VERSION}/${VERSION}/g" \
      -e "s/\${FILERESOURCE_VERSION}/$FILERESOURCE_VERSION/g" \
      -e "s/\${TELEMETRYSTATS_VERSION}/$TELEMETRYSTATS_VERSION/g" \
      -e "s/\${PUNTSTATS_VERSION}/$PUNTSTATS_VERSION/g" \
      otelcol_builder_config_yaml.txt > ocb_config.yaml
  export GOROOT="${OTEL}/go"
  export PATH="${GOROOT}/bin:${PATH}"
  export GOPATH="${GOROOT}/gopath"
  export GOCACHE="${GOROOT}/gocache"
  GOOS=linux GOARCH=arm64 ./ocb --config ocb_config.yaml
'''
dependencies = ["check-otelcol-builder", "download-go"]

[tasks.build-otelcol-and-clean]
dependencies = ["build-otelcol", "cleanup-go"]

[tasks.stage-otelcol]
category = "Build"
description = "Stage the custom otelcol-contrib binary"
workspace = false
script = '''
  export vers=${DPU_AGENT_PKG_VERSION}
  export bin=${REPO_ROOT}/bluefield/nico-dpu_${vers}_arm64/usr/bin
  mkdir -p $bin
  mv ${REPO_ROOT}/bluefield/otel/ocb-build/otelcol-contrib ${bin}
'''
dependencies = ["build-otelcol-and-clean"]

[tasks.stage-otelcol-and-clean]
dependencies = ["stage-otelcol", "cleanup-custom-otelcol-build"]

[tasks.include-otelcol]
category = "Build"
description = "Include otelcol-contrib binary in nico-dpu-agent.deb package"
workspace = false
condition = { files_modified = { input = [
  "${REPO_ROOT}/bluefield/Makefile.toml",
  "${REPO_ROOT}/bluefield/otel/ocb_url.txt",
  "${REPO_ROOT}/bluefield/otel/otelcol_version.txt",
  "${REPO_ROOT}/bluefield/otel/fileresourceprocessor/go.mod",
  "${REPO_ROOT}/bluefield/otel/fileresourceprocessor/config.go",
  "${REPO_ROOT}/bluefield/otel/fileresourceprocessor/factory.go",
  "${REPO_ROOT}/bluefield/otel/fileresourceprocessor/fileresourceprocessor.go",
  "${REPO_ROOT}/bluefield/otel/telemetrystatsprocessor/go.mod",
  "${REPO_ROOT}/bluefield/otel/telemetrystatsprocessor/config.go",
  "${REPO_ROOT}/bluefield/otel/telemetrystatsprocessor/factory.go",
  "${REPO_ROOT}/bluefield/otel/telemetrystatsprocessor/telemetrystatsprocessor.go",
], output = [
  "${REPO_ROOT}/bluefield/nico-dpu_${DPU_AGENT_PKG_VERSION}_arm64/usr/bin/otelcol-contrib",
] } }
run_task = "stage-otelcol-and-clean"

[tasks.download-node-exporter]
category = "Build"
description = "Get the Prometheus node exporter"
workspace = false
script = '''
  NODE=${REPO_ROOT}/bluefield/node_exporter
  cd ${NODE}
  VERSION=$(cat version.txt)
  URL=$(sed -e "s/\${VERSION}/${VERSION}/g" url.txt)
  TARFILE=$(basename ${URL})
  NODE_EXTRACT_DIR=${TARFILE%.tar.gz}
  wget -q $URL --directory-prefix=${NODE} --tries=5 --continue --timeout=300
  tar xvfz ${TARFILE}
  rm -f ${TARFILE}
  export vers=${DPU_AGENT_PKG_VERSION}
  export bin=${REPO_ROOT}/bluefield/nico-dpu_${vers}_arm64/usr/bin
  export licenses=${REPO_ROOT}/bluefield/nico-dpu_${vers}_arm64/usr/share/licenses
  mkdir -p $bin
  mkdir -p $licenses/node_exporter
  mv ${NODE}/${NODE_EXTRACT_DIR}/node_exporter $bin
  mv ${NODE}/${NODE_EXTRACT_DIR}/LICENSE $licenses/node_exporter
  rm -rf ${NODE}/${NODE_EXTRACT_DIR}
  touch $bin/node_exporter $licenses/node_exporter/LICENSE
'''

[tasks.include-node-exporter]
category = "Build"
description = "Include node-exporter binary in nico-dpu-agent.deb package"
workspace = false
condition = { files_modified = { input = [
  "${REPO_ROOT}/bluefield/Makefile.toml",
  "${REPO_ROOT}/bluefield/node_exporter/url.txt",
  "${REPO_ROOT}/bluefield/node_exporter/version.txt",
], output = [
  "${REPO_ROOT}/bluefield/nico-dpu_${DPU_AGENT_PKG_VERSION}_arm64/usr/bin/node_exporter",
  "${REPO_ROOT}/bluefield/nico-dpu_${DPU_AGENT_PKG_VERSION}_arm64/usr/share/licenses/node_exporter/LICENSE",
] } }
run_task = "download-node-exporter"

[tasks.download-transceiver-exporter]
category = "Build"
description = "Get the transceiver exporter"
workspace = false
script = '''
  TRANSCEIVER=${REPO_ROOT}/bluefield/transceiver_exporter
  cd ${TRANSCEIVER}
  VERSION=$(cat version.txt)
  URL=$(sed -e "s/\${VERSION}/${VERSION}/g" url.txt)
  TARFILE=$(basename ${URL})
  EXTRACT_DIR=${TARFILE%.tar.gz}
  wget -q $URL --directory-prefix=${TRANSCEIVER} --tries=5 --continue --timeout=300
  mkdir -p ${TRANSCEIVER}/${EXTRACT_DIR}
  tar xvfz ${TARFILE} -C ${TRANSCEIVER}/${EXTRACT_DIR}
  rm -f ${TARFILE}
  export vers=${DPU_AGENT_PKG_VERSION}
  export bin=${REPO_ROOT}/bluefield/nico-dpu_${vers}_arm64/usr/bin
  export licenses=${REPO_ROOT}/bluefield/nico-dpu_${vers}_arm64/usr/share/licenses
  mkdir -p $bin
  mkdir -p $licenses/transceiver-exporter
  mv ${TRANSCEIVER}/${EXTRACT_DIR}/transceiver-exporter $bin
  mv ${TRANSCEIVER}/${EXTRACT_DIR}/LICENSE.md $licenses/transceiver-exporter
  rm -rf ${TRANSCEIVER}/${EXTRACT_DIR}
  touch $bin/transceiver-exporter $licenses/transceiver-exporter/LICENSE.md
'''

[tasks.include-transceiver-exporter]
category = "Build"
description = "Include transceiver-exporter binary in nico-dpu-agent.deb package"
workspace = false
condition = { files_modified = { input = [
  "${REPO_ROOT}/bluefield/Makefile.toml",
  "${REPO_ROOT}/bluefield/transceiver_exporter/url.txt",
  "${REPO_ROOT}/bluefield/transceiver_exporter/version.txt",
], output = [
  "${REPO_ROOT}/bluefield/nico-dpu_${DPU_AGENT_PKG_VERSION}_arm64/usr/bin/transceiver-exporter",
  "${REPO_ROOT}/bluefield/nico-dpu_${DPU_AGENT_PKG_VERSION}_arm64/usr/share/licenses/transceiver-exporter/LICENSE.md",
] } }
run_task = "download-transceiver-exporter"

[tasks.setup-dpu-agent-deb-local]
category = "Build"
description = "Build the nico-dpu-agent.deb package locally"
workspace = false
script = '''
  export vers=${DPU_AGENT_PKG_VERSION}
  mkdir -p "nico-dpu_${vers}_arm64/lib/systemd/system"
  mkdir -p "nico-dpu_${vers}_arm64/usr/bin"
  mkdir -p "nico-dpu_${vers}_arm64/usr/local/bin"
  mkdir -p "nico-dpu_${vers}_arm64/usr/local/sbin"
  mkdir -p "nico-dpu_${vers}_arm64/var/lib/hbn/var/support/nico-dhcp/bin"
  mkdir -p "nico-dpu_${vers}_arm64/var/lib/hbn/var/support/nico-dhcp/conf"
  mkdir -p "nico-dpu_${vers}_arm64/var/lib/hbn/var/support/nico-dhcp/logs"
  mkdir -p "nico-dpu_${vers}_arm64/etc/otelcol-contrib/certs/private" && chmod 600 "nico-dpu_${vers}_arm64/etc/otelcol-contrib/certs/private"
  mkdir -p "nico-dpu_${vers}_arm64/etc/nico-dpu-otel-agent"
  mkdir -p "nico-dpu_${vers}_arm64/var/lib/otelcol-contrib/cursors"
  cp ${REPO_ROOT}/target/aarch64-unknown-linux-gnu/release/nico-dpu-agent "nico-dpu_${vers}_arm64/usr/bin/"
  cp ${REPO_ROOT}/target/aarch64-unknown-linux-gnu/release/nico-dhcp-server "nico-dpu_${vers}_arm64/var/lib/hbn/var/support/nico-dhcp/bin/"
  cp ${REPO_ROOT}/target/aarch64-unknown-linux-gnu/release/nico-dpu-otel-agent "nico-dpu_${vers}_arm64/usr/bin/"
  cp otel/otel-agent "nico-dpu_${vers}_arm64/usr/local/bin/" && chmod u+x "nico-dpu_${vers}_arm64/usr/local/bin/otel-agent"
  cp otel/scripts/otel_copy_certs.sh "nico-dpu_${vers}_arm64/usr/local/sbin/" && chmod u+x "nico-dpu_${vers}_arm64/usr/local/sbin/otel_copy_certs.sh"
  cp misc/nico-dpu-agent.service "nico-dpu_${vers}_arm64/lib/systemd/system/"
  cp misc/nico-dpu-otel-agent.service "nico-dpu_${vers}_arm64/lib/systemd/system/"
  cp misc/clean_core_files.sh "nico-dpu_${vers}_arm64/usr/bin/" && chmod u+x "nico-dpu_${vers}_arm64/usr/bin/clean_core_files.sh"
  cp misc/local_bmc_dev "nico-dpu_${vers}_arm64/usr/bin/"
  cp misc/local_bmc_dev.service "nico-dpu_${vers}_arm64/lib/systemd/system/"
  cp misc/node-exporter.service "nico-dpu_${vers}_arm64/lib/systemd/system/"
  cp misc/transceiver-exporter.service "nico-dpu_${vers}_arm64/lib/systemd/system/"
  cp misc/otelcol-contrib.service "nico-dpu_${vers}_arm64/lib/systemd/system/"
  cp otel/otelcol-wrapper "nico-dpu_${vers}_arm64/etc/otelcol-contrib/" && chmod u+x "nico-dpu_${vers}_arm64/etc/otelcol-contrib/otelcol-wrapper"
  cp otel/otelcol-wrapper-imports "nico-dpu_${vers}_arm64/etc/otelcol-contrib/" && chmod u+x "nico-dpu_${vers}_arm64/etc/otelcol-contrib/otelcol-wrapper-imports"
  cp otel/otelcol-wrapper-validate "nico-dpu_${vers}_arm64/etc/otelcol-contrib/" && chmod u+x "nico-dpu_${vers}_arm64/etc/otelcol-contrib/otelcol-wrapper-validate"
  cp -r otel/config-fragments "nico-dpu_${vers}_arm64/etc/otelcol-contrib/"
  cp otel/otel_config.yaml "nico-dpu_${vers}_arm64/etc/otelcol-contrib/config.yaml"
  cp otel/otel-agent-config.toml "nico-dpu_${vers}_arm64/etc/nico-dpu-otel-agent/config.toml"
  cp -r misc/DEBIAN "nico-dpu_${vers}_arm64/"
  sed -i "s/SED__DPU_AGENT_PKG_VERSION/${vers}/" nico-dpu_${vers}_arm64/DEBIAN/control
'''
dependencies = [
  "build-dpu-agent-and-dhcp-server",
  "include-otelcol",
  "include-node-exporter",
  "include-transceiver-exporter",
  "build-dpu-otel-agent",
]

