apiVersion: skaffold/v4beta2
kind: Config
metadata:
  name: nico
build:
  tagPolicy:
    sha256: {}
  local:
    push: false
    useBuildkit: true
    useDockerCLI: true
  artifacts:
    - image: nico-dns
      sync:
        infer:
          - "nico-dns"
      docker:
        dockerfile: dev/deployment/localdev/Dockerfile.dns.localdev
    - image: nico-pxe
      docker:
        dockerfile: dev/deployment/localdev/Dockerfile.pxe.localdev
      sync:
        infer:
          - "nico"
          - pxe/templates/*
          - pxe/static/*
    - image: nginx
      docker:
        dockerfile: dev/deployment/localdev/Dockerfile.nginx.localdev
      sync:
        infer:
          - "nico"
          - pxe/static/*
    - image: nico-api
      docker:
        dockerfile: dev/deployment/localdev/Dockerfile.api.localdev
        noCache: true
      sync:
        infer:
          - "nico-api"
          - api/casbin-policy.csv
          - pxe/static/*
    - image: nico-admin-cli
      docker:
        dockerfile: dev/deployment/localdev/Dockerfile.nico-admin-cli.localdev
      sync:
        infer:
          - "nico-admin-cli"
    - image: nico-dhcp-server
      docker:
        dockerfile: dev/deployment/localdev/Dockerfile.dhcpserver.localdev
      sync:
        infer:
          - "nico-dhcp-server"
    - image: nico-dhcp
      docker:
        dockerfile: dev/deployment/localdev/Dockerfile.dhcp.localdev
      sync:
        infer:
          - "libdhcp.so"
    - image: bmc-mock
      docker:
        dockerfile: dev/deployment/localdev/Dockerfile.bmc-mock.localdev
      sync:
        infer:
          - "bmc-mock"
    - image: machine-a-tron
      docker:
        dockerfile: dev/deployment/localdev/Dockerfile.machine-a-tron.localdev
      sync:
        infer:
          - "machine-a-tron"
    - image: nvmetal-scout-burn-in
      docker:
        dockerfile: dev/deployment/localdev/Dockerfile.machine-validation-config.localdev
      sync:
        infer:
          - "nvmetal-scout-burn-in"
    - image: nico-hardware-health
      docker:
        dockerfile: dev/deployment/localdev/Dockerfile.health.localdev
      sync:
        infer:
          - "hw-health"
    - image: nico-bmc-proxy
      docker:
        dockerfile: dev/deployment/localdev/Dockerfile.bmc-proxy.localdev
      sync:
        infer:
          - "nico-bmc-proxy"
    - image: ssh-console-rs
      docker:
        dockerfile: dev/deployment/localdev/Dockerfile.ssh-console.localdev
      sync:
        infer:
          - "ssh-console"
manifests:
  kustomize:
    paths:
      - nicod/envs/local-dev/site/site-controller
    buildArgs: ["--enable-alpha-plugins", "--enable-exec"]

deploy:
  kubeContext: k3s-dev
  kubectl:
    defaultNamespace: nico-system
  statusCheckDeadlineSeconds: 60
  tolerateFailuresUntilDeadline: true
