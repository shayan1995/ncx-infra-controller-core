[tasks.build-bootstrap-nico-base]
category = "Bootstrap"
workspace = false
script = '''
#!/usr/bin/env bash
set -e

echo "repo root: ${REPO_ROOT}"
DATA_PATH=${REPO_ROOT}/dev/${NICO_BOOTSTRAP_KIND}-env
echo using data path ${DATA_PATH}
source ${DATA_PATH}/envrc
CONTAINER_DATA_PATH=${CONTAINER_REPO_ROOT:-${REPO_ROOT}}/dev/${NICO_BOOTSTRAP_KIND}-env
echo using container data path ${CONTAINER_DATA_PATH}

'''

[tasks.build-bootstrap-nico-mat]
category = "Bootstrap"
workspace = false
script = '''
#!/usr/bin/env bash
set -e

DATA_PATH=${REPO_ROOT}/dev/${NICO_BOOTSTRAP_KIND}-env
echo using data path ${DATA_PATH}

./run_docker_compose_test.sh
'''
cwd = "${REPO_ROOT}/dev/bin"

[tasks.build-bootstrap-nico-dpu-discovery]
category = "Bootstrap"
workspace = false
script = '''
#!/usr/bin/env bash
set -e

DATA_PATH=${REPO_ROOT}/dev/${NICO_BOOTSTRAP_KIND}-env
echo using data path ${DATA_PATH}
source ${DATA_PATH}/envrc

DPU_COUNT=$(${REPO_ROOT}/dev/bin/psql.sh "select count(id) from machines where id like 'fm100d%';" |& tr -d ' \r\n')

if [ $DPU_COUNT -eq 0 ]
then
  RELAY_ADDRESS=$(jq '.relay_address' $DATA_PATH/host_dhcp_discovery.json | tr -d '"')
  echo Relay address: $RELAY_ADDRESS

  ${REPO_ROOT}/dev/bin/discover_dpu.sh ${DATA_PATH}
else
  echo "$DPU_COUNT DPUs exist. skipping"
fi
'''
cwd = "${REPO_ROOT}"

[tasks.build-bootstrap-nico-vmhost-init]
category = "Bootstrap"
