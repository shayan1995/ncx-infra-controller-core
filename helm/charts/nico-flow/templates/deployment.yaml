apiVersion: apps/v1
kind: Deployment
metadata:
  name: flow
  namespace: {{ include "nico-flow.namespace" . }}
  labels:
    {{- include "nico-flow.labels" . | nindent 4 }}
spec:
  replicas: {{ .Values.replicas }}
  strategy:
    type: RollingUpdate
  selector:
    matchLabels:
      {{- include "nico-flow.selectorLabels" . | nindent 6 }}
  template:
    metadata:
      labels:
        {{- include "nico-flow.labels" . | nindent 8 }}
        {{- include "nico-flow.selectorLabels" . | nindent 8 }}
      annotations:
        kubectl.kubernetes.io/default-container: flow
    spec:
      automountServiceAccountToken: {{ .Values.automountServiceAccountToken }}
      serviceAccountName: {{ .Values.serviceAccountName }}
      {{- with .Values.global.imagePullSecrets }}
      imagePullSecrets:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      containers:
        ## -------------------------------------------------------------
        ## flow — main orchestrator container (gRPC 50051)
        ## -------------------------------------------------------------
        - name: flow
          image: {{ include "nico-flow.image" (dict "component" "flow" "Values" .Values) | quote }}
          imagePullPolicy: {{ .Values.global.image.pullPolicy }}
          env:
            ## flow's GetDeploymentEnv (carbide-rest/flow/internal/service/config.go)
            ## requires FLOW_ENV ∈ {development, staging, production}; empty/unset
            ## causes the pod to fail startup validation with
            ## "FLOW_ENV is required". No implicit default in code, so set one here.
            - name: FLOW_ENV
              value: {{ .Values.flowEnv | quote }}
            - name: DB_NAME
              value: {{ .Values.database.flow.name | quote }}
            - name: DB_USER
              valueFrom:
                secretKeyRef:
                  name: {{ .Values.database.flow.credentialsSecret }}
                  key: username
            - name: DB_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: {{ .Values.database.flow.credentialsSecret }}
                  key: password
            - name: DB_HOST
              value: {{ .Values.database.host | quote }}
            - name: DB_PORT
              value: {{ .Values.database.port | quote }}
            - name: DB_CERT_PATH
              value: {{ .Values.database.certPath | quote }}
            - name: NICO_CORE_API_URL
              value: {{ .Values.nicoCoreApi.url | quote }}
            - name: TEMPORAL_NAMESPACE
              value: {{ .Values.temporal.namespace | quote }}
            - name: TEMPORAL_HOST
              value: {{ .Values.temporal.host | quote }}
            - name: TEMPORAL_PORT
              value: {{ .Values.temporal.port | quote }}
            - name: TEMPORAL_CERT_PATH
              value: {{ .Values.temporal.certPath | quote }}
            - name: TEMPORAL_ENABLE_TLS
              value: {{ .Values.temporal.enableTls | quote }}
            - name: TEMPORAL_SERVER_NAME
              value: {{ .Values.temporal.serverName | quote }}
            - name: PSM_API_URL
              value: {{ printf "psm.%s.svc.cluster.local:%d" (include "nico-flow.namespace" .) (int .Values.ports.psm) | quote }}
            - name: NSM_API_URL
              value: {{ printf "nsm.%s.svc.cluster.local:%d" (include "nico-flow.namespace" .) (int .Values.ports.nsm) | quote }}
            {{- with .Values.extraEnv.flow }}
            {{- toYaml . | nindent 12 }}
            {{- end }}
          ports:
            - name: grpc
              containerPort: {{ .Values.ports.flow }}
          resources:
            {{- toYaml .Values.resources.flow | nindent 12 }}
          volumeMounts:
            - name: spiffe
              mountPath: /var/run/secrets/spiffe.io
              readOnly: true
            {{- if .Values.flowConfig }}
            - name: flow-config-files
              mountPath: /etc/flow
              readOnly: true
            {{- end }}
            - name: temporal-client-certs
              mountPath: {{ .Values.temporal.certPath }}
              readOnly: true
        ## -------------------------------------------------------------
        ## psm — power-shelf manager (gRPC 50052)
        ## -------------------------------------------------------------
        - name: psm
          image: {{ include "nico-flow.image" (dict "component" "psm" "Values" .Values) | quote }}
          imagePullPolicy: {{ .Values.global.image.pullPolicy }}
          env:
            - name: PSM_PORT
              value: {{ .Values.ports.psm | quote }}
            - name: FW_DIR
              value: {{ .Values.firmware.psm.mountPath | quote }}
            - name: DB_NAME
              value: {{ .Values.database.psm.name | quote }}
            - name: DB_USER
              valueFrom:
                secretKeyRef:
                  name: {{ .Values.database.psm.credentialsSecret }}
                  key: username
            - name: DB_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: {{ .Values.database.psm.credentialsSecret }}
                  key: password
            - name: DB_HOST
              value: {{ .Values.database.host | quote }}
            - name: DB_PORT
              value: {{ .Values.database.port | quote }}
            - name: DB_CERT_PATH
              value: {{ .Values.database.certPath | quote }}
            - name: VAULT_TOKEN
              valueFrom:
                secretKeyRef:
                  name: {{ .Values.vault.psmTokenSecret }}
                  key: token
            - name: VAULT_ADDR
              value: {{ .Values.vault.address | quote }}
            {{- with .Values.extraEnv.psm }}
            {{- toYaml . | nindent 12 }}
            {{- end }}
          ports:
            - name: grpc-psm
              containerPort: {{ .Values.ports.psm }}
          resources:
            {{- toYaml .Values.resources.psm | nindent 12 }}
          volumeMounts:
            - name: spiffe
              mountPath: /var/run/secrets/spiffe.io
              readOnly: true
            - name: psm-firmware
              mountPath: {{ .Values.firmware.psm.mountPath }}
        ## -------------------------------------------------------------
        ## nsm — NVLink switch manager (gRPC 50053)
        ## -------------------------------------------------------------
        - name: nsm
          image: {{ include "nico-flow.image" (dict "component" "nsm" "Values" .Values) | quote }}
          imagePullPolicy: {{ .Values.global.image.pullPolicy }}
          env:
            - name: NSM_PORT
              value: {{ .Values.ports.nsm | quote }}
            - name: DB_DATABASE
              value: {{ .Values.database.nsm.name | quote }}
            - name: DB_USER
              valueFrom:
                secretKeyRef:
                  name: {{ .Values.database.nsm.credentialsSecret }}
                  key: username
            - name: DB_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: {{ .Values.database.nsm.credentialsSecret }}
                  key: password
            - name: DB_ADDR
              value: {{ .Values.database.host | quote }}
            - name: DB_PORT
              value: {{ .Values.database.port | quote }}
            - name: DB_CERT_PATH
              value: {{ .Values.database.certPath | quote }}
            - name: VAULT_TOKEN
              valueFrom:
                secretKeyRef:
                  name: {{ .Values.vault.nsmTokenSecret }}
                  key: token
            - name: VAULT_ADDR
              value: {{ .Values.vault.address | quote }}
            - name: FW_FIRMWARE_DIR
              value: {{ printf "%s/firmware" .Values.firmware.nsm.mountPath | quote }}
            - name: FW_BUNDLES_DIR
              value: {{ printf "%s/bundles" .Values.firmware.nsm.mountPath | quote }}
            {{- with .Values.extraEnv.nsm }}
            {{- toYaml . | nindent 12 }}
            {{- end }}
          ports:
            - name: grpc-nsm
              containerPort: {{ .Values.ports.nsm }}
          resources:
            {{- toYaml .Values.resources.nsm | nindent 12 }}
          volumeMounts:
            - name: spiffe
              mountPath: /var/run/secrets/spiffe.io
              readOnly: true
            - name: nsm-scratch
              mountPath: {{ .Values.firmware.nsm.mountPath }}
      volumes:
        - name: spiffe
          secret:
            secretName: {{ .Values.certificate.name }}
        {{- if .Values.flowConfig }}
        - name: flow-config-files
          configMap:
            name: flow-config-files
        {{- end }}
        - name: temporal-client-certs
          secret:
            secretName: {{ .Values.temporalCert.secretName }}
        - name: psm-firmware
          {{- toYaml .Values.firmware.psm.volume | nindent 10 }}
        - name: nsm-scratch
          {{- toYaml .Values.firmware.nsm.volume | nindent 10 }}
