## =============================================================================
## flow — rack lifecycle orchestrator (formerly RLA)
## =============================================================================
## Single pod with three gRPC containers: flow (50051), psm (50052), nsm (50053).
## Each container has its own Postgres database (flow, psm, nsm) on the shared
## nico-pg-cluster.  PSM and NSM also need a Vault token (provisioned by the
## helm-prereqs vault-config-job).
##
## Deploys into a dedicated `flow` namespace.  The namespace must carry the
## label nico.nvidia.com/managed=true so ESO syncs nico-roots in.
## =============================================================================

## Global settings (overridden by umbrella chart)
global:
  image:
    repository: ""
    tag: ""
    pullPolicy: IfNotPresent
  imagePullSecrets: []
  certificate:
    duration: 720h0m0s
    renewBefore: 360h0m0s
    privateKey:
      algorithm: ECDSA
      size: 384
    issuerRef:
      kind: ClusterIssuer
      name: vault-nico-issuer
      group: cert-manager.io
  spiffe:
    trustDomain: nico.local
  labels:
    app.kubernetes.io/managed-by: Helm
    app.kubernetes.io/part-of: site-controller

## Override the release namespace (defaults to helm install -n <namespace>)
namespaceOverride: ""

replicas: 1
serviceAccountName: flow
automountServiceAccountToken: true

## flow's GetDeploymentEnv requires FLOW_ENV to be set to one of
## "development", "staging", or "production". There is no implicit default in
## carbide-rest/flow/internal/service/config.go — an unset value causes the
## flow container to exit on startup validation. Override per environment.
flowEnv: production

## Per-component image overrides.
## Repositories default to <global.image.repository>/nico-flow etc, but each can
## be overridden independently if you want to pin one container to a different tag.
images:
  flow:
    repository: ""   # defaults to <global.image.repository>/nico-flow
    tag: ""          # defaults to global.image.tag
  psm:
    repository: ""   # defaults to <global.image.repository>/nico-psm
    tag: ""
  nsm:
    repository: ""   # defaults to <global.image.repository>/nico-nsm
    tag: ""

## Ports the three containers listen on (must stay distinct — same pod).
ports:
  flow: 50051
  psm: 50052
  nsm: 50053

resources:
  flow:
    requests:
      cpu: 100m
      memory: 256Mi
    limits:
      cpu: 1
      memory: 1Gi
  psm:
    requests:
      cpu: 100m
      memory: 256Mi
    limits:
      cpu: 500m
      memory: 512Mi
  nsm:
    requests:
      cpu: 100m
      memory: 256Mi
    limits:
      cpu: 500m
      memory: 512Mi

## SPIFFE certificate covering all three Service DNS names.
##
## Two identities live in this struct:
##   - serviceName + extraDnsNames drive the *intra-cluster* identity: Service
##     DNS, the cert commonName, and additional DNS SANs. These are what
##     in-cluster peers dial.
##   - apiIdentity.{namespace,serviceName} drive the *SPIFFE URI* baked into
##     the cert SAN. nico-api's auth middleware validates client certs against
##     its own spiffe_service_base_paths and InternalRBACRules — and rejects
##     any cert SAN that carries more than one URI (crates/authn/src/lib.rs
##     enforces "exactly 1 URI"). So this URI must be correct on its own; no
##     extraUris escape hatch.
certificate:
  name: flow-certificate
  serviceName: flow
  ## Additional DNS names — psm + nsm services live in the same namespace.
  extraDnsNames:
    - psm
    - nsm
  ## SPIFFE URI components — emitted as the single URI SAN on the cert.
  ## Defaults target nico-api with the upstream RBAC rename (PR #1907) in
  ## place: serviceName `nico-flow` is accepted by the matcher alongside the
  ## legacy `carbide-flow` alias. Override if your deployment uses different
  ## base paths or principal names.
  apiIdentity:
    namespace: nico-system
    serviceName: nico-flow

## Temporal mTLS client certificate.
## Issued by the nico-rest-ca-issuer ClusterIssuer (installed by nico-rest setup).
temporalCert:
  enabled: true
  name: temporal-client-certs
  secretName: temporal-client-certs
  duration: 2160h0m0s
  renewBefore: 360h0m0s
  commonName: temporal-client
  dnsNames:
    - temporal-client
    - flow
  privateKey:
    algorithm: RSA
    size: 2048
  issuerRef:
    kind: ClusterIssuer
    name: nico-rest-ca-issuer
    group: cert-manager.io

## Database connection settings (shared host; per-container DB and secret).
database:
  host: nico-pg-cluster.postgres.svc.cluster.local
  port: 5432
  ## CA cert that the containers use for the postgres TLS connection.
  ## Mounted from the SPIFFE secret (same ca.crt the operator signs with).
  certPath: /var/run/secrets/spiffe.io/ca.crt
  flow:
    name: flow
    credentialsSecret: flow.nico.nico-pg-cluster.credentials
  psm:
    name: psm
    credentialsSecret: psm.nico.nico-pg-cluster.credentials
  nsm:
    name: nsm
    credentialsSecret: nsm.nico.nico-pg-cluster.credentials

## NICo Core API endpoint (gRPC) that flow calls.
nicoCoreApi:
  url: nico-api.nico-system.svc.cluster.local:1079

## Temporal endpoint and namespace.
temporal:
  host: temporal-frontend-headless.temporal.svc.cluster.local
  port: 7233
  namespace: flow
  enableTls: true
  serverName: interservice.server.temporal.local
  certPath: /var/run/secrets/temporal-client-certs

## Vault for PSM/NSM dynamic secrets.
vault:
  address: https://vault.vault.svc.cluster.local:8200
  psmTokenSecret: psm-vault-token
  nsmTokenSecret: nsm-vault-token

## Firmware staging volumes (emptyDir by default; override with hostPath for sites
## that need a persistent firmware repo).
firmware:
  psm:
    volume:
      emptyDir: {}
    mountPath: /var/lib/psm/firmware
  nsm:
    volume:
      emptyDir: {}
    mountPath: /var/lib/nsm

## Optional flowconfig.yaml — when set, becomes the flow-config-files ConfigMap.
flowConfig: ""

extraEnv:
  flow: []
  psm: []
  nsm: []

## Docker registry pull secret created by the chart in the flow namespace.
## setup.sh phase 7i renders dockerconfigjson from REGISTRY_PULL_SECRET and
## passes it via --set. The default placeholder ({"auths":{}}) lets the
## chart install on air-gapped / pre-loaded clusters without overrides.
## Set create=false to skip if the secret is provisioned out of band.
imagePullSecret:
  create: true
  dockerconfigjson: "eyJhdXRocyI6e319"
